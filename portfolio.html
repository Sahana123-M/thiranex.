<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahana M — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#09090f;--fg:#f0ede8;--card:#111118;--border:rgba(240,237,232,0.08);--lime:#c8f135;--lime-fg:#09090f;--sec:#1a1a26;--muted:#8a8a9a;--r:6px}
    html{scroll-behavior:smooth;font-size:16px}
    body{background:var(--bg);color:var(--fg);font-family:'DM Sans',system-ui,sans-serif;line-height:1.6;overflow-x:hidden}
    ::-webkit-scrollbar{display:none}*{scrollbar-width:none}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;background:none;border:none;font-family:inherit;color:inherit}
    input,textarea{font-family:inherit}
    header{position:fixed;top:0;left:0;right:0;z-index:50;border-bottom:1px solid var(--border);background:rgba(9,9,15,.82);backdrop-filter:blur(12px)}
    .nav-inner{max-width:1100px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--lime);transition:opacity .2s}
    .nav-logo:hover{opacity:.65}
    .nav-links{display:flex;align-items:center;gap:32px}
    .nav-link{font-size:14px;color:var(--muted);transition:color .2s}
    .nav-link:hover,.nav-link.active{color:var(--fg)}
    .nav-link.active{color:var(--lime)}
    .nav-cta{font-size:13px;padding:6px 16px;border:1px solid var(--lime);color:var(--lime);border-radius:var(--r);transition:all .2s;display:inline-block}
    .nav-cta:hover{background:var(--lime);color:var(--lime-fg)}
    .hamburger{display:none;color:var(--fg)}
    .mobile-nav{display:none;flex-direction:column;gap:16px;padding:20px 24px;border-top:1px solid var(--border);background:var(--bg)}
    .mobile-nav.open{display:flex}
    .mob-link{font-size:15px;color:var(--muted);text-align:left}
    .mob-link.active{color:var(--lime)}
    .wrap{max-width:1100px;margin:0 auto;padding:0 24px}
    section{padding:96px 0}
    #hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding-top:64px;position:relative}
    .lbl{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--lime);margin-bottom:12px}
    .hdg{font-family:'Fraunces',Georgia,serif;font-size:clamp(2.4rem,5vw,3.6rem);font-weight:300;line-height:1.1}
    .hero-grid{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:flex-end;padding-bottom:96px}
    .hero-tag{font-family:'DM Mono',monospace;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--lime);margin-bottom:24px}
    .hero-name{font-family:'Fraunces',Georgia,serif;font-size:clamp(4rem,10vw,7rem);font-weight:300;line-height:.92;margin-bottom:28px}
    .hero-name em{color:var(--lime);font-style:normal}
    .hero-sub{font-size:18px;color:var(--muted);max-width:480px;line-height:1.65;margin-bottom:36px}
    .hero-btns{display:flex;flex-wrap:wrap;gap:14px}
    .btn-p{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:var(--lime);color:var(--lime-fg);font-size:14px;font-weight:500;border-radius:var(--r);transition:opacity .2s;border:none;cursor:pointer;font-family:inherit}
    .btn-p:hover{opacity:.88}
    .btn-o{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:1px solid var(--border);color:var(--fg);font-size:14px;font-weight:500;border-radius:var(--r);transition:border-color .2s;background:none;cursor:pointer;font-family:inherit}
    .btn-o:hover{border-color:rgba(240,237,232,.25)}
    .socials{display:flex;flex-direction:column;align-items:center;gap:18px;padding-bottom:16px}
    .socials .vline{width:1px;height:64px;background:var(--border)}
    .socials a{color:var(--muted);transition:color .2s}
    .socials a:hover{color:var(--lime)}
    .scroll-hint{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted)}
    .scroll-hint span{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase}
    .bounce{animation:bonce 1.8s infinite;display:inline-block}
    @keyframes bonce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
    .about-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:64px;align-items:start}
    .edu-card{border:1px solid var(--border);border-radius:var(--r);padding:20px 24px;margin-bottom:12px;background:var(--card)}
    .edu-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px}
    .edu-title{font-weight:500}
    .edu-loc{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
    .edu-sub{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:6px}
    .edu-date{font-family:'DM Mono',monospace;font-size:11px;color:rgba(200,241,53,.65)}
    .cert-card{display:flex;align-items:flex-start;gap:12px;border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:8px;background:var(--card)}
    .cert-ico{color:var(--lime);margin-top:2px;flex-shrink:0}
    .cert-name{font-size:13px}
    .cert-org{font-size:11px;color:var(--muted);margin-top:2px}
    .abt-text{color:var(--muted);line-height:1.75;margin-bottom:16px;font-size:15px}
    .stats{display:flex;flex-wrap:wrap;gap:32px;margin-top:36px}
    .sv{font-family:'Fraunces',Georgia,serif;font-size:2rem;font-weight:300;color:var(--lime)}
    .sl{font-size:11px;color:var(--muted);margin-top:2px}
    .proj-card{display:grid;grid-template-columns:2fr 3fr;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;transition:border-color .3s}
    .proj-card:hover{border-color:rgba(240,237,232,.15)}
    .proj-img{position:relative;overflow:hidden;background:#1a1a26;min-height:220px}
    .proj-img img{width:100%;height:100%;object-fit:cover;opacity:.5;transition:opacity .5s,transform .5s;display:block}
    .proj-card:hover .proj-img img{opacity:.72;transform:scale(1.05)}
    .proj-idx{position:absolute;top:14px;left:14px;font-family:'DM Mono',monospace;font-size:11px;color:rgba(200,241,53,.55);letter-spacing:.1em}
    .proj-yr{position:absolute;bottom:14px;left:14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
    .proj-body{padding:28px 32px;display:flex;flex-direction:column;justify-content:space-between;background:var(--card)}
    .proj-title{font-family:'Fraunces',Georgia,serif;font-size:1.5rem;font-weight:300;margin-bottom:4px}
    .proj-sub{font-family:'DM Mono',monospace;font-size:10px;color:rgba(200,241,53,.65);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
    .proj-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px}
    .proj-bul{list-style:none;margin-bottom:20px}
    .proj-bul li{display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--muted);margin-bottom:6px}
    .bdot{width:5px;height:5px;border-radius:50%;background:rgba(200,241,53,.45);margin-top:6px;flex-shrink:0}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
    .tag{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;background:var(--sec);border-radius:4px}
    .proj-links{display:flex;gap:20px;padding-top:20px;border-top:1px solid var(--border)}
    .proj-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);transition:color .2s}
    .proj-link:hover{color:var(--lime)}
    #skills{background:rgba(26,26,38,.4)}
    .sk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px}
    .sk-cat{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--lime);margin-bottom:18px}
    .sk-list{list-style:none}
    .sk-list li{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);margin-bottom:10px;transition:color .2s}
    .sk-list li:hover{color:var(--fg)}
    .sdot{width:4px;height:4px;border-radius:50%;background:rgba(200,241,53,.35);flex-shrink:0}
    .ct-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start}
    .ct-link{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);margin-bottom:14px;transition:color .2s}
    .ct-link:hover{color:var(--lime)}
    .fl{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
    .ff{width:100%;padding:12px 16px;background:var(--sec);color:var(--fg);border:1px solid var(--border);border-radius:var(--r);font-size:13px;margin-bottom:18px;outline:none;transition:border-color .2s;font-family:inherit}
    .ff::placeholder{color:rgba(138,138,154,.45)}
    .ff:focus{border-color:var(--lime)}
    textarea.ff{resize:none}
    .fsub{width:100%;padding:14px;background:var(--lime);color:var(--lime-fg);font-size:13px;font-weight:500;border-radius:var(--r);transition:opacity .2s;border:none;cursor:pointer;font-family:inherit}
    .fsub:hover{opacity:.88}
    .sent{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:72px 24px;border:1px solid rgba(200,241,53,.2);border-radius:var(--r);background:rgba(200,241,53,.04)}
    .sent-t{font-family:'Fraunces',Georgia,serif;font-size:2.5rem;font-weight:300;color:var(--lime);margin-bottom:10px}
    .sent-s{font-size:13px;color:var(--muted)}
    footer{border-top:1px solid var(--border);padding:36px 0}
    .ft{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
    .fc{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
    .fi{display:flex;gap:20px}
    .fi a{color:var(--muted);transition:color .2s}
    .fi a:hover{color:var(--lime)}
    @media(max-width:900px){.nav-links{display:none}.hamburger{display:block}.hero-grid{grid-template-columns:1fr}.socials{display:none}.about-grid{grid-template-columns:1fr}.proj-card{grid-template-columns:1fr}.proj-img{min-height:180px}.sk-grid{grid-template-columns:repeat(2,1fr)}.ct-grid{grid-template-columns:1fr;gap:48px}}
    @media(max-width:520px){.sk-grid{grid-template-columns:1fr 1fr}.hero-name{font-size:3.6rem}}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

function useScrollSpy(ids){
  const[active,setActive]=useState(ids[0]);
  useEffect(()=>{
    const h=()=>{
      const y=window.scrollY+120;
      for(let i=ids.length-1;i>=0;i--){
        const el=document.getElementById(ids[i].toLowerCase());
        if(el&&el.offsetTop<=y){setActive(ids[i]);return;}
      }
    };
    window.addEventListener("scroll",h,{passive:true});
    return()=>window.removeEventListener("scroll",h);
  },[]);
  return active;
}

                <button className="btn-p" onClick={()=>go("Projects")}>View projects <Arr/></button>

              </div>

            <div className="socials">
